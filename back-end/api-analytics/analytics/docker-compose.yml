version: '3.8'

services:
  analytics-db:
    image: postgres:15-alpine
    container_name: analytics-db
    restart: always
    environment:
      POSTGRES_USER: user_analytics
      POSTGRES_PASSWORD: password_analytics
      POSTGRES_DB: analytics_db
    ports:
      - "5434:5432" # Puerto diferente al estándar para evitar conflictos
    volumes:
      - analytics_data:/var/lib/postgresql/data

  analytics-service:
    build: .
    container_name: analytics-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user_analytics:password_analytics@analytics-db:5432/analytics_db
    depends_on:
      - analytics-db

volumes:
  analytics_data: